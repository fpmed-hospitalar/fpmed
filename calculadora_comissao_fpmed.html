<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comissões — Globalmed / Isadora</title>
<script src="gm-auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0ec;min-height:100vh;padding:1.25rem 1rem 4rem;color:#1a1a1a;}

.header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
.logo{width:42px;height:42px;background:#0a1628;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-text h1{font-size:16px;font-weight:700;color:#0a1628;}
.header-text p{font-size:12px;color:#999;margin-top:1px;}

.year-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:1.25rem;}
.year-btn{background:#fff;border:1px solid #e4e4de;border-radius:8px;padding:6px 14px;font-size:15px;font-weight:700;cursor:pointer;color:#0a1628;}
.year-btn:hover{background:#f4f4f0;}
.year-label{font-size:20px;font-weight:800;color:#0a1628;min-width:60px;text-align:center;}

.tabs{display:flex;gap:0;background:#e4e4e0;border-radius:12px;padding:4px;margin-bottom:1.25rem;}
.tab{flex:1;padding:9px 6px;font-size:13px;font-weight:600;background:transparent;border:none;border-radius:9px;color:#888;cursor:pointer;transition:all 0.15s;}
.tab.active{background:#fff;color:#0a1628;box-shadow:0 1px 4px rgba(0,0,0,0.08);}

.page{display:none;}
.page.active{display:block;}

.card{background:#fff;border-radius:16px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e8e8e4;}
.section-label{font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px;}

.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500;}
input[type="number"],input[type="date"],input[type="text"]{width:100%;padding:10px 12px;font-size:14px;border:1px solid #e4e4de;border-radius:10px;outline:none;background:#fafaf8;color:#1a1a1a;transition:border 0.15s;}
input:focus{border-color:#0a6de4;background:#fff;}
.row{display:flex;gap:10px;}
.row .field{flex:1;min-width:0;}

.toggle-group{display:flex;border:1px solid #e4e4de;border-radius:10px;overflow:hidden;}
.toggle-btn{flex:1;padding:10px 6px;font-size:13px;font-weight:600;background:transparent;border:none;color:#aaa;cursor:pointer;transition:all 0.15s;}
.toggle-btn.active{background:#0a1628;color:#fff;}

/* BOLETO OPTIONS */
.boleto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.boleto-btn{padding:10px 4px;font-size:12px;font-weight:700;background:#fafaf8;border:1px solid #e4e4de;border-radius:8px;color:#666;cursor:pointer;transition:all 0.15s;text-align:center;}
.boleto-btn.selected{background:#0a1628;color:#fff;border-color:#0a1628;}

.divider{border:none;border-top:1px solid #f0f0ec;margin:1rem 0;}

.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.metric{background:#f5f5f1;border-radius:12px;padding:12px;}
.metric.full{grid-column:1/-1;}
.metric .mlabel{font-size:11px;color:#aaa;margin-bottom:3px;}
.metric .mvalue{font-size:18px;font-weight:700;color:#0a1628;}
.metric .msub{font-size:11px;color:#bbb;margin-top:2px;}

.add-btn{width:100%;padding:13px;margin-top:12px;font-size:14px;font-weight:700;background:#0a1628;color:#fff;border:none;border-radius:12px;cursor:pointer;transition:opacity 0.15s;}
.add-btn:hover{opacity:0.85;}

/* MONTH GROUPS */
.month-group{margin-bottom:10px;border-radius:14px;overflow:hidden;border:1px solid #e8e8e4;}
.month-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#0a1628;cursor:pointer;user-select:none;}
.month-title{font-size:13px;font-weight:700;color:#fff;text-transform:capitalize;}
.month-right{display:flex;align-items:center;gap:10px;}
.month-total{font-size:13px;font-weight:700;color:#00c9a7;}
.month-count{font-size:11px;color:#555;background:#1e2d44;padding:2px 8px;border-radius:99px;}
.month-empty-badge{font-size:11px;color:#444;background:#1a2a40;padding:2px 8px;border-radius:99px;}
.chevron{color:#555;font-size:12px;transition:transform 0.2s;}
.chevron.open{transform:rotate(180deg);}

.month-body{background:#fff;}
.month-body.collapsed{display:none;}

.venda-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px;border-bottom:1px solid #f4f4f0;}
.venda-row:last-child{border-bottom:none;}
.venda-info{flex:1;min-width:0;}
.venda-pedido{font-size:13px;font-weight:700;color:#0a1628;}
.venda-cliente{font-size:12px;color:#888;margin-top:1px;}
.venda-data{font-size:11px;color:#bbb;margin-top:2px;}
.venda-tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-block;}
.tag.carteira{background:#fff3cd;color:#856404;}
.tag.novo{background:#d1e7dd;color:#0f5132;}
.tag.cond{background:#e8f0fe;color:#1a5dbf;}
.tag.valor{background:#f0f0ec;color:#555;}
.venda-right{display:flex;align-items:center;gap:8px;margin-left:10px;flex-shrink:0;}
.comm-val{font-size:15px;font-weight:700;color:#198754;}
.trash-btn{background:transparent;border:none;cursor:pointer;color:#ddd;font-size:15px;padding:4px;border-radius:6px;line-height:1;}
.trash-btn:hover{color:#e24b4a;}

.month-empty{padding:14px;font-size:12px;color:#ccc;text-align:center;}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.sum-metric{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1rem;}
.sum-metric .sl{font-size:11px;color:#aaa;margin-bottom:4px;}
.sum-metric .sv{font-size:20px;font-weight:700;color:#0a1628;}
.sum-metric .ss{font-size:11px;color:#bbb;margin-top:2px;}
.sum-metric.highlight{background:#0a1628;border-color:#0a1628;}
.sum-metric.highlight .sl{color:#555;}
.sum-metric.highlight .sv{color:#00c9a7;}
.sum-metric.highlight .ss{color:#444;}

.search-wrap{margin-bottom:1rem;position:relative;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:15px;pointer-events:none;}

.no-results{text-align:center;color:#bbb;font-size:13px;padding:1.5rem 0;}
.empty{text-align:center;color:#ccc;font-size:13px;padding:2rem 0;}

.recebido-btn{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;border:none;cursor:pointer;transition:all 0.15s;}
.recebido-btn.nao{background:#fff3cd;color:#856404;}
.recebido-btn.sim{background:#d1e7dd;color:#0f5132;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M4 13 L10 13 L12 8 L14 18 L16 13 L22 13" stroke="#00c9a7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Comissões Globalmed</h1>
    <p>Isadora — controle de recebimentos</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-nova" onclick="showPage('nova',this)">+ Nova Venda</button>
  <button class="tab" id="tab-calendario" onclick="showPage('calendario',this)">Por Mês</button>
  <button class="tab" id="tab-resumo" onclick="showPage('resumo',this)">Resumo</button>
</div>

<!-- NOVA VENDA -->
<div class="page active" id="page-nova">
  <div class="card">
    <div class="section-label">dados do pedido</div>
    <div class="row">
      <div class="field">
        <label>Nº do Pedido</label>
        <input type="text" id="pedido" placeholder="ex: 0003288"/>
      </div>
      <div class="field">
        <label>Data da Venda</label>
        <input type="date" id="dataVenda" onchange="calcular()"/>
      </div>
    </div>
    <div class="field">
      <label>Nome do Cliente</label>
      <input type="text" id="cliente" placeholder="ex: Norte Pharma"/>
    </div>
    <div class="field">
      <label>Valor da Venda (R$)</label>
      <input type="number" id="valor" placeholder="0,00" min="0" step="0.01" oninput="calcular()"/>
    </div>
    <div class="field">
      <label>Tipo de Cliente</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-carteira" onclick="setTipo('carteira')">Carteira (1%)</button>
        <button class="toggle-btn" id="btn-novo" onclick="setTipo('novo')">Novo Cliente (2%)</button>
      </div>
    </div>
    <div class="field">
      <label>Condição de Pagamento</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-avista" onclick="setCondicao('avista')">À Vista</button>
        <button class="toggle-btn" id="btn-boleto" onclick="setCondicao('boleto')">Boleto a Prazo</button>
      </div>
      <div id="boleto-options" style="display:none;">
        <div class="boleto-grid" style="margin-top:10px;">
          <button class="boleto-btn" onclick="setPrazo(30)">Boleto 30d</button>
          <button class="boleto-btn" onclick="setPrazo(40)">Boleto 40d</button>
          <button class="boleto-btn" onclick="setPrazo(45)">Boleto 45d</button>
          <button class="boleto-btn" onclick="setPrazo(60)">Boleto 60d</button>
          <button class="boleto-btn" onclick="setPrazo(90)">Boleto 90d</button>
          <button class="boleto-btn" onclick="setPrazo(120)">Boleto 120d</button>
        </div>
      </div>
    </div>

    <hr class="divider"/>
    <div class="section-label">previsão de comissão</div>
    <div class="result-grid">
      <div class="metric">
        <div class="mlabel">% comissão</div>
        <div class="mvalue" id="r-pct">1%</div>
        <div class="msub" id="r-tipo">carteira</div>
      </div>
      <div class="metric">
        <div class="mlabel">valor comissão</div>
        <div class="mvalue" id="r-valor">R$ 0,00</div>
        <div class="msub" id="r-cond">à vista</div>
      </div>
      <div class="metric full">
        <div class="mlabel">cai no mês de</div>
        <div class="mvalue" id="r-mes">—</div>
        <div class="msub" id="r-data">5º dia útil do mês seguinte ao último boleto</div>
      </div>
    </div>
    <button class="add-btn" onclick="addVenda()">✓ Salvar Pedido</button>
  </div>
</div>

<!-- CALENDARIO -->
<div class="page" id="page-calendario">
  <div class="year-nav">
    <button class="year-btn" onclick="changeYear(-1)">‹</button>
    <span class="year-label" id="year-label">2026</span>
    <button class="year-btn" onclick="changeYear(1)">›</button>
  </div>
  <div id="calendario-content"></div>
</div>

<!-- RESUMO -->
<div class="page" id="page-resumo">
  <div class="summary-grid" id="summary-metrics"></div>
  <div class="card">
    <div class="section-label">todos os pedidos</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-res" placeholder="Buscar pedido ou cliente..." oninput="renderResumo()"/>
    </div>
    <div id="summary-list"><div class="empty">nenhum pedido cadastrado</div></div>
  </div>
</div>

<script>
// ---- SUPABASE CONFIG ----
const SB_URL = 'https://vikewlbhkrikcalzsbeb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpa2V3bGJoa3Jpa2NhbHpzYmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTEzMDcsImV4cCI6MjA5MzY2NzMwN30.elMw6mbCoCbFVCnzck-aHQrXGYaZhX-m0RRb1VGYP64';

async function sbFetch(path, options={}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers||{})
    }
  });
  if(!res.ok) { const err = await res.text(); throw new Error(err); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function carregarVendas() {
  try {
    const rows = await sbFetch('comissoes_isadora?order=id.asc');
    vendas = (rows||[]).map(r => ({
      id: r.id,
      pedido: r.pedido,
      cliente: r.cliente,
      val: r.val,
      tipo: r.tipo,
      condicao: r.condicao,
      prazo: r.prazo,
      pct: r.pct,
      comissao: r.comissao,
      dataVenda: r.data_venda,
      recData: r.rec_data ? new Date(r.rec_data + 'T12:00:00') : null,
      recebido: r.recebido
    }));
  } catch(e) {
    console.error('Erro ao carregar:', e);
    vendas = [];
  }
}

async function saveVendas() { /* salvo individualmente — ver addVenda/toggleRecebido/removeVenda */ }

async function inserirVenda(v) {
  return await sbFetch('comissoes_isadora', {
    method: 'POST',
    prefer: 'return=representation',
    body: JSON.stringify({
      pedido: v.pedido,
      cliente: v.cliente,
      val: v.val,
      tipo: v.tipo,
      condicao: v.condicao,
      prazo: v.prazo,
      pct: v.pct,
      comissao: v.comissao,
      data_venda: v.dataVenda,
      rec_data: v.recData ? v.recData.toISOString().split('T')[0] : null,
      recebido: false
    })
  });
}

async function atualizarRecebido(id, recebido) {
  await sbFetch('comissoes_isadora?id=eq.' + id, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ recebido })
  });
}

async function deletarVenda(id) {
  await sbFetch('comissoes_isadora?id=eq.' + id, {
    method: 'DELETE',
    prefer: 'return=minimal'
  });
}

// ---- STATE ----
let tipo = 'carteira';
let condicao = 'avista';
let prazo = 0;
let anoAtivo = new Date().getFullYear();
let vendas = [];

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

document.getElementById('dataVenda').value = new Date().toISOString().split('T')[0];
document.getElementById('year-label').textContent = anoAtivo;

// Carregar dados do Supabase ao iniciar
(async () => {
  await carregarVendas();
  renderCalendario();
  renderResumo();
})();

// ---- TABS ----
function showPage(p, el) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  el.classList.add('active');
  if(p==='calendario') renderCalendario();
  if(p==='resumo') renderResumo();
}

// ---- YEAR ----
function changeYear(d) {
  anoAtivo += d;
  document.getElementById('year-label').textContent = anoAtivo;
  renderCalendario();
}

// ---- HELPERS ----
function quintoUtil(ano, mes) {
  let count = 0, d = new Date(ano, mes, 1);
  while(count < 5) {
    if(d.getDay()!==0 && d.getDay()!==6) count++;
    if(count < 5) d.setDate(d.getDate()+1);
  }
  return d;
}

function calcRec(dataStr, cond, pr) {
  const base = new Date(dataStr + 'T12:00:00');
  let ref = new Date(base);
  if(cond === 'boleto') {
    if(!pr) return null;
    ref.setDate(ref.getDate() + pr);
  }
  const nm = ref.getMonth()===11 ? 0 : ref.getMonth()+1;
  const na = ref.getMonth()===11 ? ref.getFullYear()+1 : ref.getFullYear();
  return quintoUtil(na, nm);
}

function fmtMoney(v) {
  return 'R$ ' + (+v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function fmtDateShort(d) {
  return new Date(d).toLocaleDateString('pt-BR');
}

function mesLabel(d) {
  const dt = new Date(d);
  return MESES[dt.getMonth()] + ' ' + dt.getFullYear();
}



// ---- FORM ----
function setTipo(t) {
  tipo = t;
  document.getElementById('btn-carteira').className = 'toggle-btn'+(t==='carteira'?' active':'');
  document.getElementById('btn-novo').className = 'toggle-btn'+(t==='novo'?' active':'');
  calcular();
}

function setCondicao(c) {
  condicao = c;
  document.getElementById('btn-avista').className = 'toggle-btn'+(c==='avista'?' active':'');
  document.getElementById('btn-boleto').className = 'toggle-btn'+(c==='boleto'?' active':'');
  document.getElementById('boleto-options').style.display = c==='boleto'?'block':'none';
  if(c==='avista') { prazo=0; document.querySelectorAll('.boleto-btn').forEach(b=>b.classList.remove('selected')); }
  calcular();
}

function setPrazo(d) {
  prazo = d;
  document.querySelectorAll('.boleto-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.textContent)===d);
  });
  calcular();
}

function calcular() {
  const pct = tipo==='carteira' ? 1 : 2;
  const val = parseFloat(document.getElementById('valor').value)||0;
  const dataVenda = document.getElementById('dataVenda').value;
  const com = val*pct/100;

  document.getElementById('r-pct').textContent = pct+'%';
  document.getElementById('r-tipo').textContent = tipo==='carteira'?'cliente da carteira':'cliente novo';
  document.getElementById('r-valor').textContent = fmtMoney(com);
  document.getElementById('r-cond').textContent = condicao==='avista'?'à vista':(prazo?'boleto '+prazo+'d':'selecione o prazo');

  if(dataVenda) {
    const rec = calcRec(dataVenda, condicao, prazo);
    if(rec) {
      document.getElementById('r-mes').textContent = mesLabel(rec);
      document.getElementById('r-data').textContent = '5º dia útil · ' + fmtDateShort(rec);
    } else {
      document.getElementById('r-mes').textContent = '—';
      document.getElementById('r-data').textContent = 'selecione o prazo do boleto';
    }
  }
}

async function addVenda() {
  const val = parseFloat(document.getElementById('valor').value);
  const dataVenda = document.getElementById('dataVenda').value;
  const pedido = document.getElementById('pedido').value.trim();
  const cliente = document.getElementById('cliente').value.trim();

  if(!val||val<=0){alert('Informe o valor da venda.');return;}
  if(!dataVenda){alert('Informe a data da venda.');return;}
  if(!cliente){alert('Informe o nome do cliente.');return;}
  if(condicao==='boleto'&&!prazo){alert('Selecione o prazo do boleto.');return;}

  const pct = tipo==='carteira'?1:2;
  const com = val*pct/100;
  const rec = calcRec(dataVenda, condicao, prazo);

    const novaVenda = { pedido:pedido||'—', cliente, val, tipo, condicao, prazo, pct, comissao:com, dataVenda, recData:rec, recebido:false };
  const btn = document.querySelector('.add-btn');
  btn.textContent = 'Salvando...'; btn.disabled = true;
  try {
    const [salvo] = await inserirVenda(novaVenda);
    novaVenda.id = salvo.id;
    vendas.push(novaVenda);
    document.getElementById('valor').value='';
    document.getElementById('pedido').value='';
    document.getElementById('cliente').value='';
    calcular();
    showPage('calendario', document.getElementById('tab-calendario'));
  } catch(e) { alert('Erro ao salvar: '+e.message); }
  finally { btn.textContent = '✓ Salvar Pedido'; btn.disabled = false; }
}

// ---- CALENDARIO ----
// VENDAS POR MÊS — agrupa por data_venda (o mês em que o pedido foi FECHADO), independente de quando a
// comissão cai. Fica separado dos blocos de recebimento de propósito: nos dados reais nenhum pedido tem venda
// e recebimento no mesmo mês, então juntar os dois num cabeçalho só mistura conjuntos diferentes — e o mês de
// venda que não tem recebimento nenhum sumiria da tela (junho/2026: 11 pedidos, R$83.803,20).
// Espelha o renderVendasMesIsa do sistema_final. Aqui o dataVenda é STRING e o recData é Date (ver carregarVendas).
// O 'T12:00:00' no parse é obrigatório: sem ele o fuso UTC-3 joga a venda do dia 1 pro mês anterior.
// SÓ CONTA NOS TOTAIS se tem número de pedido de verdade. Pedido '0000' (ou vazio) = lançamento que não é venda
// da Isadora — ex.: id=21, cliente "LEMUEL BARROS", R$11.850 de 13/07, venda externa do Lemuel lançada por engano
// aqui. Decisão do Lemuel: MANTER registrado e visível na lista, mas fora dos totais.
// Espelha o isaContaNoTotal do sistema_final. Use em TODA soma desta tela.
function contaNoTotal(v){
  const p = String(v && v.pedido != null ? v.pedido : '').replace(/\D/g,'');
  return p !== '' && parseInt(p,10) !== 0;
}

function renderVendasMes() {
  const meses = [];
  for (let m = 0; m < 12; m++) {
    const its = vendas.filter(v => {
      if (!contaNoTotal(v)) return false;          // pedido '0000' não é venda dela
      if (!v.dataVenda) return false;
      const d = new Date(v.dataVenda + 'T12:00:00');
      return d.getFullYear() === anoAtivo && d.getMonth() === m;
    });
    if (its.length) meses.push({ m, n: its.length, val: its.reduce((s,v)=>s+(Number(v.val)||0),0) });
  }
  if (!meses.length) return '';
  const totAno = meses.reduce((s,x)=>s+x.val,0);
  return `<div class="card" style="margin-bottom:1rem">
    <div style="font-size:11px;color:#8a8a80;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:10px">
      📈 Vendas por mês <span style="text-transform:none;letter-spacing:0;font-weight:400">(pela data da venda — a comissão pode cair em outro mês)</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${meses.map(x=>`<div style="background:#f7f7f3;border:1px solid #e8e8e4;border-radius:10px;padding:10px 14px;min-width:140px;flex:1">
        <div style="font-size:11px;color:#8a8a80">${MESES[x.m]} ${anoAtivo}</div>
        <div style="font-size:17px;font-weight:800;color:#0a6de4;margin-top:2px">${fmtMoney(x.val)}</div>
        <div style="font-size:11px;color:#8a8a80">${x.n} pedido${x.n>1?'s':''}</div>
      </div>`).join('')}
      <div style="background:#eef7f0;border:1px solid #cfe8d8;border-radius:10px;padding:10px 14px;min-width:140px;flex:1">
        <div style="font-size:11px;color:#8a8a80">Total ${anoAtivo}</div>
        <div style="font-size:17px;font-weight:800;color:#128a4a;margin-top:2px">${fmtMoney(totAno)}</div>
        <div style="font-size:11px;color:#8a8a80">${meses.reduce((s,x)=>s+x.n,0)} pedidos</div>
      </div>
    </div>
  </div>`;
}

function renderCalendario() {
  const container = document.getElementById('calendario-content');
  // faixa de VENDAS (por data_venda) + abaixo os blocos de RECEBIMENTO (por rec_data), que seguem como estavam
  let html = renderVendasMes()
    + `<div style="font-size:11px;color:#8a8a80;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin:4px 0 8px">💰 Recebimentos <span style="text-transform:none;letter-spacing:0;font-weight:400">(pelo mês em que a comissão cai)</span></div>`;

  for(let m=0; m<12; m++) {
    const items = vendas.filter(v => {
      if(!v.recData) return false;
      const dt = new Date(v.recData);
      return dt.getFullYear()===anoAtivo && dt.getMonth()===m;
    });

    // o '0000' continua LISTADO (fica registrado) mas não entra na soma
    const contam = items.filter(contaNoTotal);
    const total = contam.reduce((s,v)=>s+(Number(v.comissao)||0),0);
    const hasItems = items.length > 0;
    const fora = items.length - contam.length;
    const isCurrentMonth = (new Date().getFullYear()===anoAtivo && new Date().getMonth()===m);

    html += `<div class="month-group">
      <div class="month-header" onclick="toggleMonth(this)">
        <span class="month-title">${MESES[m]}${isCurrentMonth?' ·':''}</span>
        <div class="month-right">
          ${hasItems
            ? `<span class="month-total">${fmtMoney(total)}</span><span class="month-count">${contam.length} pedido${contam.length>1?'s':''}${fora?` · +${fora} fora do total`:''}</span>`
            : `<span class="month-empty-badge">sem pedidos</span>`}
          <span class="chevron${hasItems?' open':''}" style="color:#aaa;">▼</span>
        </div>
      </div>
      <div class="month-body${hasItems?'':' collapsed'}">`;

    if(!hasItems) {
      html += `<div class="month-empty">Nenhum recebimento previsto</div>`;
    } else {
      items.forEach(v => {
        const cond = v.condicao==='avista'?'À Vista':'Boleto '+v.prazo+'d';
        html += `<div class="venda-row">
          <div class="venda-info">
            <div class="venda-pedido">Pedido ${v.pedido}</div>
            <div class="venda-cliente">${v.cliente}</div>
            <div class="venda-data">Venda: ${fmtDateShort(v.dataVenda)} · Recebe: ${fmtDateShort(v.recData)}</div>
            <div class="venda-tags">
              <span class="tag ${v.tipo}">${v.tipo==='carteira'?'Carteira':'Novo'}</span>
              <span class="tag cond">${cond}</span>
              <span class="tag valor">${fmtMoney(v.val)}</span>
            </div>
          </div>
          <div class="venda-right" style="flex-direction:column;align-items:flex-end;gap:6px;">
            <span class="comm-val">+${fmtMoney(v.comissao)}</span>
            <button class="recebido-btn ${v.recebido?'sim':'nao'}" onclick="toggleRecebido(${v.id})">${v.recebido?'✓ Recebido':'Pendente'}</button>
            <button class="trash-btn" onclick="removeVenda(${v.id})" title="remover">✕</button>
          </div>
        </div>`;
      });
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function toggleMonth(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('collapsed');
  chevron.classList.toggle('open');
}

async function toggleRecebido(id) {
  const v = vendas.find(x=>x.id===id);
  if(!v) return;
  v.recebido = !v.recebido;
  try { await atualizarRecebido(id, v.recebido); renderCalendario(); } catch(e) { v.recebido=!v.recebido; alert('Erro: '+e.message); }
}

async function removeVenda(id) {
  if(!confirm('Remover este pedido?')) return;
  try { await deletarVenda(id); vendas = vendas.filter(v=>v.id!==id); renderCalendario(); renderResumo(); } catch(e) { alert('Erro: '+e.message); }
}

// ---- RESUMO ----
function renderResumo() {
  const q = (document.getElementById('search-res').value||'').toLowerCase();
  const container = document.getElementById('summary-metrics');

  const _val = vendas.filter(contaNoTotal);   // exclui o pedido '0000' de todos os KPIs
  const totalCom = _val.reduce((s,v)=>s+(Number(v.comissao)||0),0);
  const totalVendas = _val.reduce((s,v)=>s+(Number(v.val)||0),0);
  const now = new Date();

  const futuros = _val
    .filter(v=>v.recData && new Date(v.recData)>=now && !v.recebido)
    .sort((a,b)=>new Date(a.recData)-new Date(b.recData));

  let proxLabel='—', proxVal=0;
  if(futuros.length) {
    const dt = new Date(futuros[0].recData);
    const mKey = dt.getFullYear()+'-'+dt.getMonth();
    const doMes = futuros.filter(v=>{const d2=new Date(v.recData);return d2.getFullYear()+'-'+d2.getMonth()===mKey;});
    proxVal = doMes.reduce((s,v)=>s+(Number(v.comissao)||0),0);
    proxLabel = mesLabel(dt);
  }

  const recebido = _val.filter(v=>v.recebido).reduce((s,v)=>s+(Number(v.comissao)||0),0);

  container.innerHTML = `
    <div class="sum-metric highlight">
      <div class="sl">próximo recebimento</div>
      <div class="sv">${fmtMoney(proxVal)}</div>
      <div class="ss">${proxLabel}</div>
    </div>
    <div class="sum-metric">
      <div class="sl">total pendente</div>
      <div class="sv">${fmtMoney(totalCom-recebido)}</div>
      <div class="ss">${_val.filter(v=>!v.recebido).length} pedido(s)</div>
    </div>
    <div class="sum-metric">
      <div class="sl">já recebido</div>
      <div class="sv">${fmtMoney(recebido)}</div>
      <div class="ss">${_val.filter(v=>v.recebido).length} pedido(s)</div>
    </div>
    <div class="sum-metric">
      <div class="sl">volume de vendas</div>
      <div class="sv">${fmtMoney(totalVendas)}</div>
      <div class="ss">${_val.length} pedido(s) total${vendas.length>_val.length?` · +${vendas.length-_val.length} fora`:''}</div>
    </div>`;

  const filtered = vendas.filter(v=>
    v.pedido.toLowerCase().includes(q)||
    v.cliente.toLowerCase().includes(q)
  ).sort((a,b)=>new Date(b.dataVenda)-new Date(a.dataVenda));

  const listEl = document.getElementById('summary-list');
  if(!filtered.length) {
    listEl.innerHTML = q?'<div class="no-results">nenhum resultado</div>':'<div class="empty">nenhum pedido cadastrado</div>';
    return;
  }

  listEl.innerHTML = filtered.map(v=>{
    const cond = v.condicao==='avista'?'À Vista':'Boleto '+v.prazo+'d';
    return `<div class="venda-row">
      <div class="venda-info">
        <div class="venda-pedido">Pedido ${v.pedido} <span style="font-weight:400;color:#bbb;font-size:11px;">· ${fmtDateShort(v.dataVenda)}</span></div>
        <div class="venda-cliente">${v.cliente}</div>
        <div class="venda-data">Recebe em: ${v.recData?mesLabel(v.recData):'—'}</div>
        <div class="venda-tags">
          <span class="tag ${v.tipo}">${v.tipo==='carteira'?'Carteira':'Novo'}</span>
          <span class="tag cond">${cond}</span>
          <span class="tag valor">${fmtMoney(v.val)}</span>
        </div>
      </div>
      <div class="venda-right" style="flex-direction:column;align-items:flex-end;gap:6px;">
        <span class="comm-val">+${fmtMoney(v.comissao)}</span>
        <button class="recebido-btn ${v.recebido?'sim':'nao'}" onclick="toggleRecebido2(${v.id})">${v.recebido?'✓ Recebido':'Pendente'}</button>
        <button class="trash-btn" onclick="removeVenda2(${v.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleRecebido2(id) {
  const v = vendas.find(x=>x.id===id);
  if(!v) return;
  v.recebido = !v.recebido;
  try { await atualizarRecebido(id, v.recebido); renderResumo(); } catch(e) { v.recebido=!v.recebido; alert('Erro: '+e.message); }
}

async function removeVenda2(id) {
  if(!confirm('Remover este pedido?')) return;
  try { await deletarVenda(id); vendas = vendas.filter(v=>v.id!==id); renderResumo(); } catch(e) { alert('Erro: '+e.message); }
}

calcular();
</script>
